<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" fill="none">
  <!--
    Symbolic tray glyph: the orbit mark only, single colour, transparent
    background. Monochrome so it reads like the other symbolic panel icons.
    Rendered in two tints (light for dark panels, dark for light panels) and
    swapped at runtime from the desktop colour-scheme — see src-tauri/src/tray.rs.
    This source is white; the build recolours it for the dark-panel variant.
  -->
  <g transform="translate(12,12) scale(4.3333)" stroke="#FFFFFF" stroke-width="2.4"
     stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M20.341 6.484A10 10 0 0 1 10.266 21.85"/>
    <path d="M3.659 17.516A10 10 0 0 1 13.74 2.152"/>
    <circle cx="12" cy="12" r="3" fill="#FFFFFF" stroke="none"/>
    <circle cx="19" cy="5" r="2" fill="#FFFFFF" stroke="none"/>
    <circle cx="5" cy="19" r="2" fill="#FFFFFF" stroke="none"/>
  </g>
</svg>
