<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box} html,body{margin:0}
  body{width:700px;font-family:var(--font-sans);color:var(--fg-0);
    background:radial-gradient(100% 100% at 50% 0%,rgba(56,219,240,.06),transparent 60%),var(--base);padding:26px}
  .palette{border-radius:var(--r-lg);border:1px solid var(--border-strong);background:rgba(18,24,38,.82);
    backdrop-filter:blur(28px);box-shadow:var(--shadow-pop),var(--inset-top);overflow:hidden}
  .pin{display:flex;align-items:center;gap:11px;padding:14px 16px;border-bottom:1px solid var(--border)}
  .pin svg{width:17px;height:17px;color:var(--accent)}
  .pin .ph{font:var(--text-body);color:var(--fg-2)}
  .grp{font:var(--text-micro);letter-spacing:var(--tracking-micro);text-transform:uppercase;color:var(--fg-3);padding:11px 16px 5px}
  .item{display:flex;align-items:center;gap:11px;padding:9px 16px;font:var(--text-small);color:var(--fg-1)}
  .item svg{width:15px;height:15px;color:var(--fg-2)}
  .item.sel{background:var(--accent-wash)}
  .item.sel,.item.sel svg{color:var(--accent-bright)}
  .item .sp{margin-left:auto;font:var(--text-data-sm);color:var(--fg-3)}
</style>
</head>
<body>
  <div class="palette">
    <div class="pin"><i data-lucide="search"></i><span class="ph">Search repos, run a command…</span></div>
    <div class="grp">Commands</div>
    <div class="item sel"><i data-lucide="refresh-cw"></i>Rescan all roots<span class="sp">⌘R</span></div>
    <div class="item"><i data-lucide="folder-git-2"></i>Add root directory…</div>
    <div class="grp">Repos</div>
    <div class="item"><i data-lucide="circle"></i>Orrery<span class="sp">~/dev/orrery</span></div>
    <div class="item"><i data-lucide="circle"></i>nextdocs<span class="sp">~/dev/nextdocs</span></div>
  </div>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
