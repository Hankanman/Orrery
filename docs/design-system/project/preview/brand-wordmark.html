<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box} html,body{margin:0}
  body{width:700px;font-family:var(--font-sans);color:var(--fg-0);
    background:radial-gradient(120% 90% at 78% -10%,rgba(56,219,240,.10),transparent 55%),var(--base);
    padding:26px 28px;display:flex;align-items:center;gap:34px}
  .lockup{display:flex;align-items:center;gap:16px}
  .mark{width:46px;height:46px;display:grid;place-items:center;
    filter:drop-shadow(0 0 14px var(--accent-glow))}
  .mark svg{width:46px;height:46px}
  .word{font-weight:600;font-size:38px;letter-spacing:-.02em;color:var(--fg-0)}
  .tag{font:var(--text-small);color:var(--fg-2);margin-top:3px}
  .divider{width:1px;height:64px;background:var(--border-strong)}
  .variants{display:flex;gap:18px;align-items:center}
  .chip{display:flex;flex-direction:column;align-items:center;gap:8px}
  .swatch{width:54px;height:54px;border-radius:var(--r-md);display:grid;place-items:center;
    border:1px solid var(--border)}
  .swatch svg{width:28px;height:28px}
  .on-void{background:var(--void)}
  .on-glass{background:var(--glass);backdrop-filter:blur(14px)}
  .on-cyan{background:var(--accent)}
  .lbl{font:var(--text-micro);letter-spacing:var(--tracking-micro);text-transform:uppercase;color:var(--fg-3)}
</style>
</head>
<body>
  <div class="lockup">
    <div class="mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.341 6.484A10 10 0 0 1 10.266 21.85"/><path d="M3.659 17.516A10 10 0 0 1 13.74 2.152"/>
        <circle cx="12" cy="12" r="3"/><circle cx="19" cy="5" r="2"/><circle cx="5" cy="19" r="2"/>
      </svg>
    </div>
    <div>
      <div class="word">Orrery</div>
      <div class="tag">every repo in orbit</div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="variants">
    <div class="chip"><div class="swatch on-void">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.341 6.484A10 10 0 0 1 10.266 21.85"/><path d="M3.659 17.516A10 10 0 0 1 13.74 2.152"/><circle cx="12" cy="12" r="3"/><circle cx="19" cy="5" r="2"/><circle cx="5" cy="19" r="2"/></svg>
    </div><div class="lbl">on void</div></div>
    <div class="chip"><div class="swatch on-glass">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--fg-0)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.341 6.484A10 10 0 0 1 10.266 21.85"/><path d="M3.659 17.516A10 10 0 0 1 13.74 2.152"/><circle cx="12" cy="12" r="3"/><circle cx="19" cy="5" r="2"/><circle cx="5" cy="19" r="2"/></svg>
    </div><div class="lbl">on glass</div></div>
    <div class="chip"><div class="swatch on-cyan">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--void)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.341 6.484A10 10 0 0 1 10.266 21.85"/><path d="M3.659 17.516A10 10 0 0 1 13.74 2.152"/><circle cx="12" cy="12" r="3"/><circle cx="19" cy="5" r="2"/><circle cx="5" cy="19" r="2"/></svg>
    </div><div class="lbl">on accent</div></div>
  </div>
</body>
</html>
