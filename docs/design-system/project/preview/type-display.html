<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box} html,body{margin:0}
  body{width:700px;font-family:var(--font-sans);color:var(--fg-0);background:var(--base);padding:24px 28px}
  .row{display:flex;align-items:baseline;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
  .row:last-child{border-bottom:none}
  .meta{font:var(--text-data-sm);color:var(--fg-3);white-space:nowrap;margin-left:20px}
</style>
</head>
<body>
  <div class="row"><span class="orr-display">every repo in orbit</span><span class="meta">Display · Geist 600 · 32/-1%</span></div>
  <div class="row"><span class="orr-h1">Mission control</span><span class="meta">H1 · Geist 600 · 24</span></div>
  <div class="row"><span class="orr-h2">Local-first grid</span><span class="meta">H2 · Geist 600 · 19</span></div>
  <div class="row"><span class="orr-h3">Multi-host sync</span><span class="meta">H3 · Geist 500 · 16</span></div>
</body>
</html>
