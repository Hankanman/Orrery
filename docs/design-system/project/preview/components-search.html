<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box} html,body{margin:0}
  body{width:700px;font-family:var(--font-sans);color:var(--fg-0);background:var(--base);padding:24px 26px;
    display:flex;flex-direction:column;gap:16px}
  .search{display:flex;align-items:center;gap:10px;background:var(--glass-2);border:1px solid var(--border-strong);
    border-radius:var(--r-sm);padding:10px 13px}
  .search svg{width:16px;height:16px;color:var(--fg-2)}
  .search input{flex:1;background:none;border:none;outline:none;color:var(--fg-0);font:var(--text-body)}
  .search input::placeholder{color:var(--fg-3)}
  .kbd{font:var(--text-data-sm);color:var(--fg-2);border:1px solid var(--border);border-radius:var(--r-xs);padding:2px 6px}
  .chips{display:flex;gap:8px;flex-wrap:wrap}
  .chip{display:inline-flex;align-items:center;gap:6px;font:var(--text-data-sm);border-radius:var(--r-full);
    padding:5px 12px;border:1px solid var(--border);color:var(--fg-1);background:var(--glass)}
  .chip svg{width:13px;height:13px}
  .chip.on{background:var(--accent-wash);border-color:var(--border-accent);color:var(--accent-bright)}
  .chip .dot{width:8px;height:8px;border-radius:50%}
</style>
</head>
<body>
  <div class="search">
    <i data-lucide="search"></i>
    <input placeholder="Search repos, run a command…" value="">
    <span class="kbd">⌘K</span>
  </div>
  <div class="chips">
    <span class="chip on"><i data-lucide="circle-dot"></i>Dirty</span>
    <span class="chip"><i data-lucide="arrow-up"></i>Ahead</span>
    <span class="chip"><span class="dot" style="background:var(--lang-rust)"></span>Rust</span>
    <span class="chip"><span class="dot" style="background:var(--lang-ts)"></span>TypeScript</span>
    <span class="chip"><i data-lucide="star"></i>Starred</span>
    <span class="chip"><i data-lucide="clock"></i>Recent</span>
  </div>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
