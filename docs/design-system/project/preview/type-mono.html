<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box} html,body{margin:0}
  body{width:700px;font-family:var(--font-sans);color:var(--fg-0);background:var(--base);padding:24px 28px}
  .lead{font:var(--text-micro);letter-spacing:var(--tracking-micro);text-transform:uppercase;color:var(--fg-2);margin-bottom:14px}
  .grid{display:flex;flex-direction:column;gap:11px}
  .row{display:flex;align-items:center;gap:14px}
  .data{font:var(--text-data);color:var(--fg-1)}
  .data .accent{color:var(--accent-bright)}
  .data .clean{color:var(--clean)} .data .dirty{color:var(--dirty)} .data .behind{color:var(--behind)}
  .data .star{color:var(--star)} .data .muted{color:var(--fg-2)}
  .meta{font:var(--text-data-sm);color:var(--fg-3);margin-left:auto}
</style>
</head>
<body>
  <div class="lead">Geist Mono — machine data</div>
  <div class="grid">
    <div class="row"><span class="data"><span class="muted">⎇</span> main &nbsp;<span class="clean">↑2</span> <span class="muted">↓0</span> &nbsp;<span class="dirty">● 3 changes</span></span><span class="meta">status row</span></div>
    <div class="row"><span class="data muted">Hankanman/Orrery · ~/dev/orrery</span><span class="meta">slug · path</span></div>
    <div class="row"><span class="data"><span class="star">★ 1.2k</span> &nbsp;<span class="muted">last commit 4h ago</span></span><span class="meta">enrichment</span></div>
    <div class="row"><span class="data accent">code {path}</span><span class="meta">launcher template</span></div>
  </div>
</body>
</html>
