<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box} html,body{margin:0}
  body{width:700px;font-family:var(--font-sans);color:var(--fg-0);background:var(--base);padding:26px 28px}
  .row{display:flex;gap:18px;align-items:flex-end}
  .item{display:flex;flex-direction:column;align-items:center;gap:10px}
  .box{width:78px;height:78px;background:var(--glass-2);border:1px solid var(--border-strong);box-shadow:var(--inset-top)}
  .nm{font:var(--text-data-sm);color:var(--fg-1)}
  .px{font:var(--text-data-sm);color:var(--fg-3)}
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--r-xs)"></div><span class="nm">xs</span><span class="px">4 · chips</span></div>
    <div class="item"><div class="box" style="border-radius:var(--r-sm)"></div><span class="nm">sm</span><span class="px">6 · buttons</span></div>
    <div class="item"><div class="box" style="border-radius:var(--r-md)"></div><span class="nm">md</span><span class="px">10 · cards</span></div>
    <div class="item"><div class="box" style="border-radius:var(--r-lg)"></div><span class="nm">lg</span><span class="px">14 · panels</span></div>
    <div class="item"><div class="box" style="border-radius:var(--r-xl)"></div><span class="nm">xl</span><span class="px">20 · hero</span></div>
    <div class="item"><div class="box" style="border-radius:var(--r-full)"></div><span class="nm">full</span><span class="px">dots</span></div>
  </div>
</body>
</html>
