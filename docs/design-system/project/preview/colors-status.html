<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box} html,body{margin:0}
  body{width:700px;font-family:var(--font-sans);color:var(--fg-0);background:var(--base);padding:24px 26px}
  .row{display:flex;gap:12px}
  .sw{flex:1;border-radius:var(--r-md);border:1px solid var(--border);padding:13px;background:var(--glass)}
  .chip{width:30px;height:30px;border-radius:var(--r-sm)}
  .name{font:var(--text-body-strong);margin-top:11px}
  .hex{font:var(--text-data-sm);color:var(--fg-2);margin-top:2px}
  .use{font:var(--text-small);color:var(--fg-1);margin-top:6px}
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--clean);box-shadow:0 0 14px var(--clean-glow)"></div><div class="name" style="color:var(--clean)">clean</div><div class="hex">#3DD68C</div><div class="use">clean · ahead · synced</div></div>
    <div class="sw"><div class="chip" style="background:var(--dirty)"></div><div class="name" style="color:var(--dirty)">dirty</div><div class="hex">#FF9E45</div><div class="use">uncommitted changes</div></div>
    <div class="sw"><div class="chip" style="background:var(--behind)"></div><div class="name" style="color:var(--behind)">behind</div><div class="hex">#FF6B6B</div><div class="use">behind · conflict · error</div></div>
    <div class="sw"><div class="chip" style="background:var(--stale)"></div><div class="name" style="color:var(--stale)">stale</div><div class="hex">#6C778C</div><div class="use">no recent activity</div></div>
  </div>
</body>
</html>
