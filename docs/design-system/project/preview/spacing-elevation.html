<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box} html,body{margin:0}
  body{width:700px;font-family:var(--font-sans);color:var(--fg-0);
    background:radial-gradient(120% 90% at 85% 0%,rgba(56,219,240,.05),transparent 55%),var(--base);padding:30px 28px}
  .row{display:flex;gap:20px;align-items:center;justify-content:space-between}
  .item{display:flex;flex-direction:column;align-items:center;gap:13px}
  .box{width:96px;height:62px;border-radius:var(--r-md);background:var(--raised);border:1px solid var(--border)}
  .nm{font:var(--text-data-sm);color:var(--fg-2)}
  .glow{box-shadow:var(--glow-accent);border-color:var(--border-accent)}
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-1)"></div><span class="nm">shadow-1</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-2)"></div><span class="nm">shadow-2 · cards</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-3)"></div><span class="nm">shadow-3 · popovers</span></div>
    <div class="item"><div class="box glow"></div><span class="nm">glow-accent · active</span></div>
  </div>
</body>
</html>
