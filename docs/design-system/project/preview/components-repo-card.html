<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box} html,body{margin:0}
  body{width:700px;font-family:var(--font-sans);color:var(--fg-0);background:var(--base);padding:22px 24px;
    display:flex;gap:16px}
  .card{flex:1;border-radius:var(--r-md);border:1px solid var(--border);background:var(--glass);
    backdrop-filter:blur(18px);box-shadow:var(--shadow-2),var(--inset-top);padding:15px 16px}
  .card.hov{border-color:var(--border-accent);box-shadow:var(--shadow-3),0 0 28px var(--accent-glow),var(--inset-top);
    background:var(--glass-hover);transform:translateY(-2px)}
  .head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
  .name{display:flex;align-items:center;gap:8px;font:var(--text-h3);color:var(--fg-0)}
  .ldot{width:9px;height:9px;border-radius:50%;flex:none}
  .badge{font:var(--text-data-sm);color:var(--fg-2);border:1px solid var(--border);border-radius:var(--r-xs);padding:2px 7px}
  .slug{font:var(--text-data-sm);color:var(--fg-2);margin-top:5px}
  .desc{font:var(--text-small);color:var(--fg-1);margin-top:9px;line-height:1.45}
  .status{display:flex;align-items:center;gap:12px;font:var(--text-data-sm);margin-top:13px}
  .status .clean{color:var(--clean)} .status .dirty{color:var(--dirty)} .status .muted{color:var(--fg-2)}
  .acts{display:flex;gap:8px;margin-top:14px}
  .b{flex:1;display:inline-flex;align-items:center;justify-content:center;gap:6px;font:var(--text-data-sm);
    border-radius:var(--r-sm);padding:7px 0;cursor:pointer}
  .b svg{width:14px;height:14px}
  .b.ide{background:var(--accent);color:var(--void)}
  .b.agent{background:var(--glass-2);color:var(--fg-0);border:1px solid var(--border-strong)}
  .tag{position:absolute;font:var(--text-micro);letter-spacing:var(--tracking-micro);text-transform:uppercase;color:var(--fg-3);margin-top:-18px}
</style>
</head>
<body>
  <div class="card">
    <div class="head"><div class="name"><span class="ldot" style="background:var(--lang-rust)"></span>Orrery</div><span class="badge">Rust</span></div>
    <div class="slug">Hankanman/Orrery · ~/dev/orrery</div>
    <div class="desc">Every repo in orbit — a Linux-native command center.</div>
    <div class="status"><span class="muted">⎇ main</span><span class="clean">↑2 ↓0</span><span class="dirty">● 3</span><span class="muted">4h ago</span></div>
    <div class="acts"><span class="b ide"><i data-lucide="code"></i>IDE</span><span class="b agent"><i data-lucide="square-terminal"></i>Agent</span></div>
  </div>
  <div class="card hov">
    <div class="head"><div class="name"><span class="ldot" style="background:var(--lang-ts)"></span>nextdocs</div><span class="badge">TypeScript</span></div>
    <div class="slug">Hankanman/nextdocs · ~/dev/nextdocs</div>
    <div class="desc">Hover state — lifts, cyan-tinted border, soft glow.</div>
    <div class="status"><span class="muted">⎇ main</span><span class="clean">↑0 ↓0</span><span class="clean">● clean</span><span class="muted">2d ago</span></div>
    <div class="acts"><span class="b ide"><i data-lucide="code"></i>IDE</span><span class="b agent"><i data-lucide="square-terminal"></i>Agent</span></div>
  </div>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
