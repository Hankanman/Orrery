<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  *{box-sizing:border-box} html,body{margin:0}
  body{width:700px;font-family:var(--font-sans);background:var(--base);padding:26px 28px}
  .row{display:flex;flex-direction:column;gap:14px}
  .line{display:flex;align-items:center;gap:16px}
  .dot{width:18px;height:18px;border-radius:50%;flex:none;border:1px solid var(--border)}
  .txt{flex:1}
  .hex{font:var(--text-data-sm);color:var(--fg-3)}
</style>
</head>
<body>
  <div class="row">
    <div class="line"><span class="dot" style="background:var(--fg-0)"></span><span class="txt" style="color:var(--fg-0);font:var(--text-h3)">fg-0 — display names, headings</span><span class="hex">#EEF2F8</span></div>
    <div class="line"><span class="dot" style="background:var(--fg-1)"></span><span class="txt" style="color:var(--fg-1);font:var(--text-body)">fg-1 — body copy, descriptions</span><span class="hex">#AFB9CB</span></div>
    <div class="line"><span class="dot" style="background:var(--fg-2)"></span><span class="txt" style="color:var(--fg-2);font:var(--text-body)">fg-2 — slugs, paths, meta labels</span><span class="hex">#6C778C</span></div>
    <div class="line"><span class="dot" style="background:var(--fg-3)"></span><span class="txt" style="color:var(--fg-3);font:var(--text-body)">fg-3 — disabled, placeholders, faint</span><span class="hex">#434E63</span></div>
  </div>
</body>
</html>
