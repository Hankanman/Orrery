name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    name: Rust (fmt + clippy + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # GPUI renders with Vulkan (blade) and talks Wayland/X11 directly, so the
      # build needs the Vulkan/Wayland/xkbcommon/fontconfig headers — not the old
      # WebKitGTK stack.
      - name: Install GPUI build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libvulkan-dev libwayland-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libxcb1-dev libfontconfig1-dev libssl-dev \
            build-essential cmake pkg-config

      # Pinned (matches rust-toolchain.toml) so a newer clippy can't fail CI on
      # untouched code with new lints. Bump deliberately.
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check
      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Tests
        run: cargo test --workspace
