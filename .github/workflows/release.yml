name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# tauri-action creates the GitHub Release and uploads the bundles.
permissions:
  contents: write

jobs:
  release:
    name: Build & release (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libssl-dev libxdo-dev build-essential cmake pkg-config

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: dtolnay/rust-toolchain@1.94.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: pnpm install --frozen-lockfile

      # Fetch a pinned llama.cpp build so the llama.cpp AI backend works out of
      # the box. The binary + its shared libs land in src-tauri/llama-runtime/,
      # which tauri.conf.json bundles as a resource; the app unpacks it into the
      # app-data bin/ on first use. Bump LLAMA_TAG to update the shipped engine.
      - name: Bundle llama-server runtime
        env:
          LLAMA_TAG: b9551
        run: |
          set -euo pipefail
          cd src-tauri/llama-runtime
          asset="llama-${LLAMA_TAG}-bin-ubuntu-x64.tar.gz"
          curl -fsSL -o llama.tar.gz \
            "https://github.com/ggml-org/llama.cpp/releases/download/${LLAMA_TAG}/${asset}"
          tar xzf llama.tar.gz
          cp "llama-${LLAMA_TAG}/llama-server" .
          cp "llama-${LLAMA_TAG}"/*.so* .
          chmod +x llama-server
          rm -rf llama.tar.gz "llama-${LLAMA_TAG}"
          ls -la

      - name: Build bundles & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Skip the strip pass — linuxdeploy's bundled strip can't parse the
          # .relr.dyn section modern linkers emit, which aborts the AppImage.
          NO_STRIP: "true"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Orrery ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          releaseBody: |
            Linux builds of Orrery. See the [documentation](https://hankanman.github.io/Orrery/) for setup.

            > Early development — expect rough edges. Built from the source at this tag.
