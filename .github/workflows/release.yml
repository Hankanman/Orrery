name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build & release (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # GPUI build deps (Vulkan/Wayland/xkbcommon/fontconfig) + tools the
      # packagers need (file for cargo-deb, desktop-file-utils + fuse for the
      # AppImage).
      - name: Install build & packaging deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libvulkan-dev libwayland-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libxcb1-dev libfontconfig-1-dev libssl-dev \
            build-essential cmake pkg-config \
            file desktop-file-utils libfuse2

      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release -p orrery

      - name: Install packaging tools
        run: cargo install cargo-deb cargo-generate-rpm

      - name: Build .deb
        run: cargo deb -p orrery --no-build

      - name: Build .rpm
        run: cargo generate-rpm -p crates/orrery

      # Fetch a pinned llama.cpp build so the bundled AI backend works out of the
      # box in the AppImage. Bump LLAMA_TAG to update the shipped engine. Only the
      # AppImage bundles it; deb/rpm stay lean (Ollama / user-installed llama).
      - name: Fetch llama-server runtime (AppImage only)
        env:
          LLAMA_TAG: b9551
        run: |
          set -euo pipefail
          work="$(mktemp -d)"
          asset="llama-${LLAMA_TAG}-bin-ubuntu-x64.tar.gz"
          curl -fsSL -o "$work/llama.tar.gz" \
            "https://github.com/ggml-org/llama.cpp/releases/download/${LLAMA_TAG}/${asset}"
          tar xzf "$work/llama.tar.gz" -C "$work"
          mkdir -p packaging/llama-runtime
          # Archive layout varies by tag; flatten llama-server + its shared libs.
          find "$work" -type f -name 'llama-server' -exec cp {} packaging/llama-runtime/ \;
          find "$work" -type f -name '*.so*' -exec cp {} packaging/llama-runtime/ \;
          chmod +x packaging/llama-runtime/llama-server
          rm -rf "$work"
          ls -la packaging/llama-runtime

      - name: Build AppImage
        run: bash packaging/appimage.sh

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp target/debian/*.deb dist/
          cp target/generate-rpm/*.rpm dist/
          cp dist-appimage/*.AppImage dist/
          ls -la dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: true
          generate_release_notes: true
          body: |
            Linux builds of Orrery (native GPUI). See the
            [documentation](https://hankanman.github.io/Orrery/) for setup.

            - `.deb` — Debian/Ubuntu
            - `.rpm` — Fedora/openSUSE
            - `.AppImage` — portable (any distro)

            > Early development — expect rough edges. Built from the source at this tag.
